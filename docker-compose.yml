version: '3.8'

services:
  # 1. Base de datos (Debe coincidir con tus variables de entorno)
  hsi-db:
    image: postgres:12
    container_name: hsi-db
    environment:
      - POSTGRES_USER=WAPPY
      - POSTGRES_PASSWORD=Felix.Bedoya15W
      - POSTGRES_DB=hsi_db
    volumes:
      - hsi_db_data:/var/lib/postgresql/data
    networks:
      - hsi-network
    restart: always

  # 2. El Backend (El que tiene el hospital.jar de 217MB)
  hsi-app:
    build: .
    container_name: hsi-app
    depends_on:
      - hsi-db
    ports:
      - "8080:8080"
    environment:
      # IMPORTANTE: El host ahora es 'hsi-db' para que se encuentren
      - SPRING_DATASOURCE_URL=jdbc:postgresql://hsi-db:5432/hsi_db
      - SPRING_DATASOURCE_USERNAME=WAPPY
      - SPRING_DATASOURCE_PASSWORD=Felix.Bedoya15W
      - SERVER_PORT=8080
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    networks:
      - hsi-network
    restart: always

networks:
  hsi-network:
    driver: bridge

volumes:
  hsi_db_data: